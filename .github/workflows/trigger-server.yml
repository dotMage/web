name: Trigger server rebuild

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger dotmage-server Docker rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_TOKEN }}" \
            https://api.github.com/repos/dotMage/dotmage-server/dispatches \
            -d '{"event_type": "web-updated"}'
